admin_server:
  enabled: true
  listen: 0.0.0.0:8889 [::]:8889
cameras:
  gopro-hero-12:
    bluetooth_adapter: 'hci0'
    gopro_bluetooth_retry_delay_s: 30
    gopro_ble_identifier: '3272'
    gopro_model: hero11
    iface: 'wlan1'

    day_settings:
      trigger_exposure_composite_value: 1.0 # Composite value is ISO * exposure time. 3 = 100 * 0.03s
      # Command reference here: https://github.com/KonradIT/goprowifihack and https://gopro.github.io/OpenGoPro/http
      urlpaths_commands: 
        - /gopro/camera/presets/load?id=65536 # single photo preset

        - /gp/gpControl/setting/145/0 # shutter auto
        - /gp/gpControl/setting/115/0 # Auto AWB (Night scenes with stars should be 4500K)
        - /gp/gpControl/setting/125/3 # Output: 0-standard 1-raw 2-hrd 3-superphoto
        - /gp/gpControl/setting/116/2 # Gopro Color
        - /gp/gpControl/setting/114/0 # ProTune off

        - /gp/gpControl/setting/75/3 # ISO Min: 100
        - /gp/gpControl/setting/24/3 # ISO Max: 100
        - /gp/gpControl/setting/118/5 # ev comp -0.5
    night_settings:
      trigger_exposure_composite_value: 2.0 
      urlpaths_commands:
        #       - /gp/gpControl/command/sub_mode?mode=1&sub_mode=2 # Night photo mode
        - /gopro/camera/presets/load?id=65539 # night photo preset
        - /gp/gpControl/setting/125/0 # Output: 0-standard 1-raw 2-hrd 3-superphoto
        - /gp/gpControl/setting/114/1 # ProTune on
        - /gp/gpControl/setting/144/18 # Night Photo

        - /gp/gpControl/setting/19/0 # Exposure time for NightPhoto: Auto
        - /gp/gpControl/setting/115/0 # Auto AWB (Night scenes with stars should be 4500K)
        - /gp/gpControl/setting/116/2 # gopro Color
        - /gp/gpControl/setting/75/3 # ISO Min: 100
        - /gp/gpControl/setting/24/4 # ISO Max: 1600

        - /gp/gpControl/setting/117/1 # Sharpness: medium
        - /gp/gpControl/setting/118/3 # ev comp 0.5
    astro_settings:
      trigger_exposure_composite_value: 6000.0 # max value in day : 10 * 199. Min value in night: 20 * 99 ISO = 1980
      urlpaths_commands:
        - /gopro/camera/presets/load?id=65539 # night photo preset
        - /gp/gpControl/setting/125/0 # Output: 0-standard 1-raw 2-hrd 3-superphoto
        - /gp/gpControl/setting/114/1 # ProTune on
        - /gp/gpControl/setting/19/6 # Exposure time for NightPhoto: 30s
        #- /gp/gpControl/setting/115/0 # Auto AWB (Night scenes with stars should be 4500K)
        - /gp/gpControl/setting/115/10 # 3200K for stars
        - /gp/gpControl/setting/75/4 # ISO Min: 3200
        - /gp/gpControl/setting/24/5 # ISO Max: 3200
        - /gp/gpControl/setting/13/3 # ISO Max: 3200
        - /gp/gpControl/setting/117/1 # Sharpness: medium
        - /gp/gpControl/setting/118/0  # ev comp +2
    gopro_ip: 10.5.5.9 # Default for GoPro over Wifi (when the GoPro is an access point)
    lat: -17.5
    lon: -149.8
    postprocessing:
    - type: "crop"
      area: "0,500,5568,4386"
    - background_color: "(100, 100, 100)"
      color: white
      enabled: true
      position: top_right
      size: 36
      type: timestamp
    - type: sun_path
      enabled: false
      overlay_width: 1000  # Width of the overlay in pixels
      position: "top_center" # e.g., top_left, bottom_right, etc.
      padding: 5 # Optional padding from the edge
      # Bar thickness options still work
      major_bar_width: 4
      minor_bar_width: 2
      overlay_bar_width: 4
      overlay_rect_width: 15
      overlay_border_width: 3
      overlay_border_color: "white"
      major_bar_color: "grey"
      minor_bar_color: "#333333" # Can be hex code
      overlay_bar_color: "rgba(255, 0, 0, 0.5)" # Can be RGBA for transparency
      overlay_rect_height_ratio: 1.0
      background_color: "rgba(255, 255, 255, 0.3)"
      sun_arc_color: "rgba(255, 165, 0, 0.65)"
    - angle: 180
      type: rotate
    - width: 1920
      type: resize
    - enabled: true
      type: gather_metrics
    sky_area: 0,0,100,61
    ssim_area: 0,0,100,61
    ssim_setpoint: 0.87
    sunrise_sunset: #Slows down the timelapse around the sunrise sunset based on your GPC location
      enabled: true
  gopro-hero-11:
    bluetooth_adapter: 'hci0'
    gopro_bluetooth_retry_delay_s: 30
    gopro_ble_identifier: '7065'
    gopro_model: hero9
    iface: 'wlan0'

    day_settings:
      trigger_exposure_composite_value: 1.0 # Composite value is ISO * exposure time. 3 = 100 * 0.03s
      # Command reference here: https://github.com/KonradIT/goprowifihack and https://gopro.github.io/OpenGoPro/http
      urlpaths_commands: 
#        - /gp/gpControl/command/mode?p=1
        #- /gp/gpControl/command/sub_mode?mode=1&sub_mode=1

        #- /gp/gpControl/setting/144/17 # Single Photo mode
        - /gp/gpControl/setting/145/0 # shutter auto
        - /gp/gpControl/setting/115/0 # Auto AWB (Night scenes with stars should be 4500K)
        - /gp/gpControl/setting/116/0 # Gopro Color
        - /gp/gpControl/setting/114/0 # ProTune off

#        - /gp/gpControl/setting/17/0
#        - /gp/gpControl/setting/82/0
        #- /gp/gpControl/setting/100/1
        #- /gp/gpControl/setting/21/1
        #- /gp/gpControl/setting/22/0
        #- /gp/gpControl/setting/23/0
        #- /gp/gpControl/setting/24/1
        - /gp/gpControl/setting/75/3 # ISO Min: 100
        #- /gp/gpControl/setting/13/2 # ISO Max: 400
        #- /gp/gpControl/setting/97/0
        #- /gp/gpControl/setting/118/4 # ev comp 0
    night_settings:
      trigger_exposure_composite_value: 2.0 
      urlpaths_commands:
        #- /gp/gpControl/command/sub_mode?mode=1&sub_mode=2 # Night photo mode
        #- /gp/gpControl/setting/144/18 # Night Photo

        - /gp/gpControl/setting/19/0 # Exposure time for NightPhoto: Auto
        #- /gp/gpControl/setting/19/3 # Exposure time for NightPhoto: 10s
        - /gp/gpControl/setting/114/1 # ProTune on
        - /gp/gpControl/setting/115/0 # Auto AWB (Night scenes with stars should be 4500K)
        - /gp/gpControl/setting/116/0 # gopro Color
        - /gp/gpControl/setting/75/3 # ISO Min: 100
        - /gp/gpControl/setting/24/4 # ISO Max: 1600
        - /gp/gpControl/setting/117/1 # Sharpness: medium
        #- /gp/gpControl/setting/118/2 # ev comp 1
    astro_settings:
      trigger_exposure_composite_value: 5500.0 # max value in day : 10 * 199. Min value in night: 20 * 99 ISO = 1980
      urlpaths_commands:
        - /gp/gpControl/setting/19/6 # Exposure time for NightPhoto: 30s
        - /gp/gpControl/setting/114/1 # ProTune on
        #- /gp/gpControl/setting/115/0 # Auto AWB (Night scenes with stars should be 4500K)
        - /gp/gpControl/setting/115/10 # 3200K for stars
        - /gp/gpControl/setting/116/0 # gopro Color
        - /gp/gpControl/setting/75/5 # ISO Min: 3200
        - /gp/gpControl/setting/24/5 # ISO Max: 3200
        #- /gp/gpControl/setting/13/3 # ISO Max: 3200
        - /gp/gpControl/setting/117/1 # Sharpness: medium
        #- /gp/gpControl/setting/118/0  ev comp +2
    #gopro_day_settings: # you can can the profile IDs by sending sending a curl to http://10.5.5.9/gopro/camera/presets/get
    #  profile_id: 65536 # Specific profile for GoPro Hero 11 Single photo mode
    #  settings:
    #    '125': 3
    #gopro_night_settings:
    #  profile_id: 65539 #Specific to Gopro Hero 11. Night mode locks the ISO at 100
    gopro_ip: 10.5.5.9 # Default for GoPro over Wifi (when the GoPro is an access point)
    lat: -17.5
    lon: -149.8
    postprocessing:
    - background_color: "(100, 100, 100)"
      color: white
      enabled: true
      position: top_right
      size: 36
      type: timestamp
    - type: sun_path
      enabled: false
      overlay_width: 1000  # Width of the overlay in pixels
      position: "top_center" # e.g., top_left, bottom_right, etc.
      padding: 5 # Optional padding from the edge
      # Bar thickness options still work
      major_bar_width: 4
      minor_bar_width: 2
      overlay_bar_width: 4
      overlay_rect_width: 15
      overlay_border_width: 3
      overlay_border_color: "white"
      major_bar_color: "grey"
      minor_bar_color: "#333333" # Can be hex code
      overlay_bar_color: "rgba(255, 0, 0, 0.5)" # Can be RGBA for transparency
      overlay_rect_height_ratio: 1.0
      background_color: "rgba(255, 255, 255, 0.3)"
      sun_arc_color: "rgba(255, 165, 0, 0.65)"
    - angle: 180
      type: rotate
    - width: 1920
      type: resize
    - enabled: true
      type: gather_metrics
    sky_area: 0,0,100,61
    ssim_area: 0,0,100,61
    ssim_setpoint: 0.87
    sunrise_sunset: #Slows down the timelapse around the sunrise sunset based on your GPC location
      enabled: true
global:
  logging_level: DEBUG
  log_dir: /srv/fenetre/logs #Not really used anymore
  timezone: America/Los_Angeles
  ui:
    fullscreen_camera: gopro-hero-11
    landing_page: fullscreen
  work_dir: /srv/fenetre/data
  storage_management:
    check_interval_s: 60
    dry_run: false
    enabled: true
    work_dir_max_size_GB: 100
http_server:
  enabled: true
timelapse:
  ffmpeg_2pass: true
  ffmpeg_options: -c:v libvpx-vp9 -b:v 5M -deadline best -speed 0
  file_extension: mp4
  framerate: 60
  daily_timelapse:
    # https://trac.ffmpeg.org/wiki/Encode/VP9#twopass
    enabled: false
    file_extension: mp4
  frequent_timelapse:
    enabled: false
    ffmpeg_2pass: false
    # Raspberry pi 4 HW accel will be used if on Pi and ffmpeg_options isn't selected
    # Intel NUC hardware acceleration
    ffmpeg_options: -extbrc 1 -look_ahead 1 -look_ahead_depth 60 -g 120 -bf 3 -preset
      veryslow -c:v hevc_qsv -b:v 4M -maxrate 5M -bufsize 8M -profile:v main -movflags
      +faststart
    file_extension: mp4
    framerate: 30
    interval_s: 1200
